name: Update Rules

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC (4h after ipnova + domainnova at 02:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for --amend to read last commit message

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python3 sources/scripts/test_offline.py

      - name: Build rule sets
        run: python3 sources/scripts/build_rules.py --repo-root .

      - name: Validate output
        run: python3 sources/scripts/validate_output.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # output/ uses a single-commit strategy: amend the last output commit
          # instead of appending a new one. This keeps git history lean regardless
          # of how many weekly runs accumulate. Source code commits are unaffected
          # because they never touch output/ directly.
          LAST_MSG=$(git log -1 --pretty=%s)
          if echo "$LAST_MSG" | grep -q "^sync: rulenova"; then
            # Last commit was an output commit — amend it
            git commit --amend --no-edit --date="$(date -u -R)"
            git push --force-with-lease
          else
            # First output commit, or last commit was a source change — normal commit
            git commit -m "sync: rulenova $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: update
    if: ${{ needs.update.result == 'failure' }}
    timeout-minutes: 5
    steps:
      - name: Log failure
        run: echo "RuleNova update failed — check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
